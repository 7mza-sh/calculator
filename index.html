    <!-- -------------------- Title -------------------- -->
    <title>Calculator</title>
    <!-- -------------------- //Title// -------------------- -->
    
    <!-- -------------------- OG Tags -------------------- -->
    <meta property="og:title" content="Calculator">
    <meta property="og:site_name" content="Calculator">
    <meta property="og:description" content="A simple and responsive calculator built with HTML, CSS, and JavaScript. It performs basic arithmetic operations with a clean, user-friendly interface and works smoothly on both desktop and mobile devices.">

    <meta name="twitter:title" content="Calculator">

    <meta name="twitter:url" content="https://7mza-sh.github.io/calculator/">
    <!-- -------------------- //Twitter// -------------------- -->
    
    <!-- -------------------- icons -------------------- -->
    <meta name="theme-color" content="#172233">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://7mza-sh.github.io/icons/favicon-96x96.png" sizes="96x96" />

    <!-- -------------------- Links -------------------- -->
    <link rel="stylesheet" href="style.css" />
    <!-- -------------------- //Links// -------------------- -->
    
  </head>

  <body>

    <main class="calculator">
      <section class="display">
        <div class="display-expression"></div>
        <div class="display-result">0</div>
      </section>

      <section class="keypad">
        <div class="numbers">
          <button class="btn btn-number">7</button>
          <button class="btn btn-number">8</button>
          <button class="btn btn-number">9</button>
          <button class="btn btn-number">4</button>
          <button class="btn btn-number">5</button>
          <button class="btn btn-number">6</button>
          <button class="btn btn-number">1</button>
          <button class="btn btn-number">2</button>
          <button class="btn btn-number">3</button>
          <button class="btn btn-clear">AC</button>
          <button class="btn btn-number">0</button>
          <button class="btn btn-equals">=</button>
        </div>

        <div class="operators">
          <button class="btn btn-operator">÷</button>
          <button class="btn btn-operator">×</button>
          <button class="btn btn-operator">−</button>
          <button class="btn btn-operator">+</button>
        </div>
      </section>
    </main>
    
    <script src="script.js"></script>
  </body>

</html>
